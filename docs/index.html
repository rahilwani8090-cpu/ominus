<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ominus AI</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 32 32" width="28" height="28">
                        <rect width="32" height="32" rx="6" fill="#d97706"/>
                        <circle cx="16" cy="16" r="10" fill="none" stroke="#1a1a1a" stroke-width="2"/>
                        <text x="16" y="21" font-family="Inter, sans-serif" font-size="14" font-weight="700" 
                              fill="#1a1a1a" text-anchor="middle">O</text>
                        <circle cx="24" cy="8" r="3" fill="#1a1a1a"/>
                    </svg>
                    <span class="logo-text">Ominus</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New chat
                </button>
            </div>
            <div class="conversations-list" id="conversationsList">
            </div>
            <div class="sidebar-footer">
                <button class="settings-btn" id="settingsBtn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"></path>
                    </svg>
                    Settings
                </button>
                <button class="model-selector" id="modelSelector">
                    <span class="model-icon">⚡</span>
                    <span class="model-name">Gemini 2.5 Flash</span>
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <h1 class="welcome-title">Ominus AI</h1>
                    <p class="welcome-subtitle">Your intelligent assistant powered by Gemini and Groq</p>
                    <div class="suggestion-cards">
                        <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
                            <div class="suggestion-icon">🔬</div>
                            <div class="suggestion-text">Explain quantum computing in simple terms</div>
                        </button>
                        <button class="suggestion-card" data-prompt="Write a Python function to calculate fibonacci numbers">
                            <div class="suggestion-icon">💻</div>
                            <div class="suggestion-text">Write a Python function to calculate fibonacci numbers</div>
                        </button>
                        <button class="suggestion-card" data-prompt="Help me brainstorm ideas for a sci-fi story">
                            <div class="suggestion-icon">✨</div>
                            <div class="suggestion-text">Help me brainstorm ideas for a sci-fi story</div>
                        </button>
                        <button class="suggestion-card" data-prompt="Analyze the pros and cons of renewable energy">
                            <div class="suggestion-icon">🌱</div>
                            <div class="suggestion-text">Analyze the pros and cons of renewable energy</div>
                        </button>
                    </div>
                </div>
                <div class="messages" id="messages"></div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <div class="attachments-preview" id="attachmentsPreview"></div>
                    <div class="input-row">
                        <button class="attach-btn" id="attachBtn" title="Attach file">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>
                        <textarea 
                            class="message-input" 
                            id="messageInput" 
                            placeholder="Message Ominus..."
                            rows="1"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" disabled>
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="input-footer">
                    <span class="disclaimer">Ominus AI can make mistakes. Please verify important information.</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Model Modal -->
    <div class="model-modal" id="modelModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Model</h3>
                <button class="close-modal" id="closeModelModal">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="model-list" id="modelList"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settingsModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="close-modal" id="closeSettingsModal">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label for="geminiKey">Gemini API Key</label>
                    <input type="password" id="geminiKey" placeholder="Enter your Gemini API key">
                    <span class="setting-hint">Get from <a href="https://makersuite.google.com/app/apikey" target="_blank">Google AI Studio</a></span>
                </div>
                <div class="setting-item">
                    <label for="groqKey">Groq API Key</label>
                    <input type="password" id="groqKey" placeholder="Enter your Groq API key">
                    <span class="setting-hint">Get from <a href="https://console.groq.com/keys" target="_blank">Groq Console</a></span>
                </div>
                <button class="save-settings-btn" id="saveSettings">Save Settings</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" multiple style="display: none;">
    <script src="app.js"></script>
</body>
</html>
