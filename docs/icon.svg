<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad1)" />
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#1a1a1a" stroke-width="3" />
  
  <!-- O letter stylized -->
  <text x="50" y="68" font-family="Inter, sans-serif" font-size="45" font-weight="700" 
        fill="#1a1a1a" text-anchor="middle">O</text>
  
  <!-- AI spark/dot -->
  <circle cx="72" cy="28" r="6" fill="#1a1a1a" />
  
  <!-- Connection lines suggesting neural network -->
  <line x1="50" y1="15" x2="50" y2="25" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" />
  <line x1="25" y1="50" x2="35" y2="50" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" />
  <line x1="65" y1="50" x2="75" y2="50" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" />
</svg>
