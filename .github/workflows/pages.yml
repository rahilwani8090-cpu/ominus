name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Prepare static files
        run: |
          mkdir -p _site
          cp static/index.html _site/
          cp static/style.css _site/
          cp static/app.js _site/
          cp static/favicon.svg _site/
          cp static/icon.svg _site/
          # Update paths for GitHub Pages
          sed -i 's|href="static/|href="|g' _site/index.html
          sed -i 's|src="static/|src="|g' _site/index.html
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
