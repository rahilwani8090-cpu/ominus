name: Validate Static Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check HTML validity
      run: |
        # Verify main HTML file exists and is valid
        if [ ! -f "index.html" ]; then
          echo "❌ index.html not found"
          exit 1
        fi
        echo "✅ index.html found"
    
    - name: Check CSS file
      run: |
        if [ ! -f "style.css" ]; then
          echo "❌ style.css not found"
          exit 1
        fi
        echo "✅ style.css found"
    
    - name: Check JavaScript files
      run: |
        if [ ! -f "app.js" ]; then
          echo "❌ app.js not found"
          exit 1
        fi
        if [ ! -f "ai-team.js" ]; then
          echo "❌ ai-team.js not found"
          exit 1
        fi
        if [ ! -f "voice-automation.js" ]; then
          echo "❌ voice-automation.js not found"
          exit 1
        fi
        echo "✅ All JavaScript files found"
    
    - name: Verify file integrity
      run: |
        echo "📋 File checksums:"
        wc -l *.html *.css *.js 2>/dev/null | tail -1
        echo "✅ All files present and readable"
    
    - name: Check documentation
      run: |
        echo "📚 Documentation files:"
        ls -1 *.md | head -10
        echo "✅ Documentation verified"
