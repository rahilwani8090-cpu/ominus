services:
  - type: web
    name: ominus-ai
    runtime: rust
    buildCommand: cargo build --release
    startCommand: ./target/release/ominus
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: RUST_LOG
        value: info
    healthCheckPath: /
